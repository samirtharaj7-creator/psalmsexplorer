      tailwind = {

      };

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",

    <script src="https://unpkg.com/@babel/standalone@7.25.7/babel.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600&family=Space+Grotesk:wght@500;600;700&display=swap");

      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        background: #f7fbff;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 999px;
        border: 3px solid transparent;
        background-clip: content-box;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }

      .no-scrollbar {
        scrollbar-width: none;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

    </style>
